{% extends "base.html" %}
{% block title %}统计 - SD Artist Tester{% endblock %}
{% block content %}
<h1>统计</h1>
<div class="stats-cards" id="cards"></div>
<div class="two-col">
  <div class="card">
    <h2>最常用艺术家 (Top 20)</h2>
    <div id="top-artists"></div>
  </div>
  <div class="card">
    <h2>模式分布</h2>
    <div id="mode-count"></div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
async function load() {
  const r = await fetch('/api/stats');
  const data = await r.json();
  document.getElementById('cards').innerHTML = `
    <div class="stat-card"><div class="num">${data.total_generated}</div><div class="lbl">总生成</div></div>
    <div class="stat-card"><div class="num">${data.total_artists}</div><div class="lbl">艺术家</div></div>
    <div class="stat-card"><div class="num">${data.total_loras}</div><div class="lbl">LoRAs</div></div>
    <div class="stat-card"><div class="num">${data.total_tokens.toLocaleString()}</div><div class="lbl">Token</div></div>
    <div class="stat-card"><div class="num">¥${data.total_cost}</div><div class="lbl">总成本</div></div>`;
  const max = Math.max(1, ...data.top_artists.map(a => a.count));
  document.getElementById('top-artists').innerHTML = data.top_artists.length
    ? data.top_artists.map(a => `
      <div class="bar-row">
        <div class="bar-label">${a.name}</div>
        <div class="bar"><div class="bar-fill" style="width:${a.count/max*100}%">${a.count}</div></div>
      </div>`).join('')
    : '<div class="muted">还没有数据</div>';
  const total = Object.values(data.mode_count).reduce((s, n) => s + n, 0) || 1;
  document.getElementById('mode-count').innerHTML = Object.keys(data.mode_count).length
    ? Object.entries(data.mode_count).map(([m, c]) => `
      <div class="bar-row">
        <div class="bar-label">${m}</div>
        <div class="bar"><div class="bar-fill" style="width:${c/total*100}%">${c}</div></div>
      </div>`).join('')
    : '<div class="muted">还没有数据</div>';
}
load();
</script>
{% endblock %}
